<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FishTank 3D</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <canvas id="c"></canvas>

    <!-- 최소 UI: 오른쪽 아래 3개 버튼만 -->
    <div class="hud">
      <button id="modeFeed" class="iconBtn" title="Feed">🍤</button>
      <button id="modeDecor" class="iconBtn" title="Decor">🪴</button>
      <button id="modeSave" class="iconBtn" title="Save">💾</button>
    </div>

    <div class="toast" id="toast">Ready</div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
